<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remarkable Colours of Science</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:2rem 1.5rem}
h1{font-size:22px;font-weight:500;margin-bottom:0.3rem}
.subtitle{font-size:14px;color:#666;margin-bottom:1.5rem}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.controls input{flex:1;min-width:180px;font-size:13px;padding:7px 12px;border:0.5px solid #ccc;border-radius:8px;background:#fff;outline:none}
.controls input:focus{border-color:#888}
#tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid #bbb;cursor:pointer;color:#555;background:#fff;transition:background 0.15s;font-family:inherit}
.tag.active{background:#e8e8e0;color:#1a1a1a;border-color:#888}
.sort-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:0.6rem}
.sort-label{font-size:11px;color:#999}
.sort-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid #bbb;cursor:pointer;color:#555;background:#fff;font-family:inherit;transition:background 0.15s}
.sort-btn.active{background:#e8e8e0;color:#1a1a1a;border-color:#888}
.count{font-size:12px;color:#999;margin-bottom:0.8rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.swatch{height:60px;flex-shrink:0}
.info{padding:9px 13px 11px;flex:1}
.name{font-size:13px;font-weight:500;color:#1a1a1a;margin:0 0 3px;line-height:1.3}
.sub{font-size:11px;color:#666;margin:0 0 6px;line-height:1.4}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mono{font-size:10px;font-family:'SF Mono',Consolas,monospace;color:#555;background:#f0f0ea;border-radius:3px;padding:2px 6px}
.cat{font-size:10px;color:#999;font-style:italic}
.copy-btn{font-size:10px;padding:2px 7px;border-radius:3px;border:0.5px solid #bbb;cursor:pointer;color:#555;background:#fff;font-family:inherit;margin-left:auto;transition:background 0.15s}
.copy-btn:hover{background:#f0f0ea}
.copy-btn.copied{color:#2a7a2a;border-color:#2a7a2a;background:#f0faf0}
@media(max-width:500px){body{padding:1rem}.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<h1>Remarkable colours of science</h1>
<p class="subtitle">Atomic spectroscopy · Astrophysics · Lasers · Plasma · Chemistry · Biology · Mineralogy · Nuclear · Physics</p>
<div class="controls">
  <input type="text" id="search" placeholder="Search name or description…" oninput="render()">
  <div id="tags"></div>
</div>
<div class="sort-row">
  <span class="sort-label">Sort by</span>
  <button class="sort-btn" id="s-default" onclick="setSort('default')">Default</button>
  <button class="sort-btn" id="s-name" onclick="setSort('name')">Name A–Z</button>
  <button class="sort-btn active" id="s-hue" onclick="setSort('hue')">Hue</button>
  <button class="sort-btn" id="s-lightness" onclick="setSort('lightness')">Lightness</button>
  <button class="sort-btn" id="s-saturation" onclick="setSort('saturation')">Saturation</button>
  <button class="sort-btn" id="s-category" onclick="setSort('category')">Category</button>
</div>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<script>
const DATA=[
["Rayleigh sky blue","λ≈450–480 nm — Rayleigh scattering of short λ by N₂/O₂","rgba(94,159,255,1)","Atmospheric"],
["Infinite-temperature blackbody","T→∞ limit; Planckian peak λ→0; sRGB chromaticity converges to equal-energy white point D_E","rgba(148,177,255,1)","Thermal/Blackbody"],
["Cherenkov glow","v>c/n in medium; Frank–Tamm theory; peak ~420 nm in water (n≈1.34)","rgba(0,200,255,1)","Particle Physics"],
["Photon shot-noise white","Flat power spectrum across all visible λ; theoretical equal-energy illuminant E","rgba(240,255,240,1)","Physics"],
["MigFlow grain colour","Historical default grain colour in MigFlow/scontact DEM visualisation; semi-transparent amber","rgba(255,170,0,0.3)","Physics"],
["Quartz UV edge","λ≈380 nm; short-wavelength limit of human vision; foveal S-cone response drops to ~1%","rgba(80,0,160,1)","Atomic/Spectral"],
["Ca II H line","λ=396.8 nm; Fraunhofer H line; deep indigo in solar absorption spectrum","rgba(60,0,180,1)","Atomic/Spectral"],
["Hβ Balmer","λ=486.1 nm; n=4→2 hydrogen transition; anchor of Balmer series calibration","rgba(0,60,255,1)","Atomic/Spectral"],
["Fraunhofer b₁","λ=518.4 nm; Mg I triplet; used in early spectroscopic wavelength standards","rgba(20,200,40,1)","Atomic/Spectral"],
["Fraunhofer D","λ=589.0 nm; Na I doublet; first Fraunhofer line identified as atomic absorption","rgba(255,200,0,1)","Atomic/Spectral"],
["Hα wing","λ≈620 nm; red edge of Hα line profile; dominant in stellar prominence imaging","rgba(255,70,0,1)","Atomic/Spectral"],
["Fraunhofer A band","λ≈686.7 nm; O₂ atmospheric absorption; outermost standard Fraunhofer marker","rgba(200,0,10,1)","Atomic/Spectral"],
];

function parseRgba(s){
  const m=s.match(/rgba?\((\d+),(\d+),(\d+)/);
  return m?[+m[1],+m[2],+m[3]]:[0,0,0];
}

function toHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2;
  if(max===min)return[0,0,l];
  const d=max-min,s=l>0.5?d/(2-max-min):d/(max+min);
  let h;
  if(max===r)h=(g-b)/d+(g<b?6:0);
  else if(max===g)h=(b-r)/d+2;
  else h=(r-g)/d+4;
  return[h/6,s,l];
}

let sortMode='default';
let activeCats;

const CATS=[...new Set(DATA.map(d=>d[3]))].sort();
activeCats=new Set(CATS);

function setSort(mode){
  sortMode=mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+mode).classList.add('active');
  render();
}

function buildTags(){
  const wrap=document.getElementById('tags');
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='tag active';
    b.textContent=c;
    b.onclick=()=>{
      if(activeCats.has(c)){if(activeCats.size>1)activeCats.delete(c);}
      else activeCats.add(c);
      b.className='tag'+(activeCats.has(c)?' active':'');
      render();
    };
    wrap.appendChild(b);
  });
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let visible=DATA.filter(d=>activeCats.has(d[3])&&(!q||d[0].toLowerCase().includes(q)||d[1].toLowerCase().includes(q)));

  if(sortMode==='name'){
    visible=[...visible].sort((a,b)=>a[0].localeCompare(b[0]));
  } else if(sortMode==='hue'){
    visible=[...visible].sort((a,b)=>{
      const [r1,g1,b1]=parseRgba(a[2]);
      const [r2,g2,b2]=parseRgba(b[2]);
      return toHsl(r1,g1,b1)[0]-toHsl(r2,g2,b2)[0];
    });
  } else if(sortMode==='lightness'){
    visible=[...visible].sort((a,b)=>{
      const [r1,g1,b1]=parseRgba(a[2]);
      const [r2,g2,b2]=parseRgba(b[2]);
      return toHsl(r2,g2,b2)[2]-toHsl(r1,g1,b1)[2];
    });
  } else if(sortMode==='saturation'){
    visible=[...visible].sort((a,b)=>{
      const [r1,g1,b1]=parseRgba(a[2]);
      const [r2,g2,b2]=parseRgba(b[2]);
      return toHsl(r2,g2,b2)[1]-toHsl(r1,g1,b1)[1];
    });
  } else if(sortMode==='category'){
    visible=[...visible].sort((a,b)=>a[3].localeCompare(b[3])||a[0].localeCompare(b[0]));
  }

  document.getElementById('count').textContent=visible.length+' / '+DATA.length+' entries';
  document.getElementById('grid').innerHTML=visible.map(d=>{
    const[name,sub,rgba,cat]=d;
    const isNull=rgba==='rgba(0,0,0,0)';
    const swatchStyle=isNull
      ?'background:repeating-linear-gradient(45deg,#ccc,#ccc 2px,#eee 2px,#eee 8px)'
      :'background:'+rgba;
    return`<div class="card"><div class="swatch" style="${swatchStyle}"></div><div class="info"><p class="name">${name}</p><p class="sub">${sub}</p><div class="row"><span class="mono">${rgba}</span><span class="cat">${cat}</span><button class="copy-btn" onclick="copyRgba(this,'${rgba}')" title="Copy RGBA">copy</button></div></div></div>`;
  }).join('');
}

function copyRgba(btn,rgba){
  navigator.clipboard.writeText(rgba).then(()=>{
    btn.textContent='copied';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},1500);
  });
}

buildTags();
render();
</script>
</body>
</html>
