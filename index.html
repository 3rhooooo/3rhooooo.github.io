<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations</title>
<style>
  :root {
    --bg: #fafaf8; --text: #1a1a18; --muted: #888880; --line: #e8e8e4;
    --mono: 'Courier New', monospace; --sans: system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111110; --text: #e8e8e0; --muted: #666660; --line: #222220; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; }
  body { max-width: 640px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }
  header { margin-bottom: 3rem; }
  h1 { font-size: 1rem; font-weight: 400; color: var(--muted); }
  .entry {
    display: grid; grid-template-columns: 1fr auto; align-items: baseline;
    gap: 1rem; padding: 0.9rem 0; border-top: 1px solid var(--line);
    text-decoration: none; color: inherit;
  }
  .entry:last-child { border-bottom: 1px solid var(--line); }
  .entry:hover .title { text-decoration: underline; text-underline-offset: 3px; }
  .title { font-size: 0.95rem; }
  .desc  { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }
  .date  { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
</style>
</head>
<body>
<header><h1>Alexandre Pirot</h1></header>
<div id="list"></div>
<script>
const PRESENTATIONS = [
{
    title: "Remarkable colours of science",
    desc:  "Remarkable colours for presentations and papers",
    url:   "pretty_colours/pretty_colours.html"
  },
  {
    title: "CSMA - Giens 2026",
    desc:  "17ème Colloque National en Calcul des Structures",
    url:   "2026_CSMA_Giens/index.html",
    date:  "18-22/05/2026"
  }
  
  /* { title: "...", desc: "...", url: "subfolder/", date: "" } */
];

const list = document.getElementById('list');
[...PRESENTATIONS].sort((a,b) => (b.date||'').localeCompare(a.date||'')).forEach(p => {
  const a = document.createElement('a');
  a.className = 'entry';
  a.href = p.url;
  a.innerHTML = `
    <div>
      <div class="title">${p.title}</div>
      ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
    </div>
    <span class="date">${p.date || ''}</span>`;
  list.appendChild(a);
});
</script>
</body>
</html>
